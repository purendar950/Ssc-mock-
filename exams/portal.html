<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname.endsWith(".github.io")?"/"+location.pathname.split("/")[1]+"/":"/")+'">')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Mock Tests — ExamZen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <h1 class="section-title" id="exam-title">Loading…</h1>

      <!-- Tier tabs -->
      <div class="tabs" id="tier-tabs"></div>
      <!-- Year tabs -->
      <div class="tabs" id="year-tabs"></div>
      <!-- Category tabs -->
      <div class="tabs" id="cat-tabs"></div>

      <div id="mock-list"></div>
    </div>
  </main>

  <!-- Upgrade modal -->
  <div class="modal-backdrop" id="upgrade-modal">
    <div class="modal">
      <h3>🔒 Premium test</h3>
      <p class="muted">This test is part of Premium. Upgrade once (₹99/yr) to unlock all mocks, PYQs and unlimited reattempts.</p>
      <div class="modal-actions">
        <button class="btn btn-outline btn-block" onclick="closeUpgrade()">Maybe later</button>
        <a class="btn btn-primary btn-block" href="pricing.html">View Plans</a>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    EZ.mountChrome("exams");
    const examId = EZ.qs("exam") || "cgl";
    const wantTab = EZ.qs("tab"); // optional: full_mocks | sectional | subject_wise
    const CATS = [["full_mocks","Full Mocks"],["sectional","Sectionals"],["subject_wise","Subject Wise"]];
    let exam = null, tier = null, year = null, cat = wantTab || "full_mocks";

    fetch("data/catalog.json").then(r=>r.json()).then(catalog => {
      const all = (catalog.categories || []).flatMap(c => c.exams || []);
      const meta = all.find(e => e.id === examId);
      if (!meta || !meta.dataFile) throw new Error("no exam");
      document.getElementById("exam-title").textContent = meta.name + " Mock Tests";
      if (meta.subtitle) {
        const sub = document.createElement("p");
        sub.className = "muted"; sub.style.marginTop = "-6px"; sub.textContent = meta.subtitle;
        document.getElementById("exam-title").after(sub);
      }
      return fetch("data/" + meta.dataFile);
    }).then(r=>r.json()).then(d => {
      exam = d;
      tier = Object.keys(d.data)[0];
      pickYear();
      if (!CATS.some(([k]) => k === cat)) cat = "full_mocks";
      renderTierTabs(); renderYearTabs(); renderCatTabs(); renderList();
    }).catch(()=> {
      document.getElementById("mock-list").innerHTML = '<div class="empty-state">Could not load tests. Serve over HTTP (not file://).</div>';
      document.getElementById("exam-title").textContent = "Exam not found";
    });

    function tierLabel(t){ return t.replace("tier","Tier "); }
    function pickYear(){ const years = Object.keys(exam.data[tier]||{}); year = years[0]; }

    function renderTierTabs(){
      const tiers = Object.keys(exam.data);
      document.getElementById("tier-tabs").innerHTML = tiers.map(t =>
        `<button class="${t===tier?'active':''}" onclick="setTier('${t}')">${tierLabel(t)}</button>`).join("");
    }
    function renderYearTabs(){
      const years = Object.keys(exam.data[tier]||{});
      document.getElementById("year-tabs").innerHTML = years.length>1 ? years.map(y =>
        `<button class="${y===year?'active':''}" onclick="setYear('${y}')">${y}</button>`).join("") : "";
    }
    function renderCatTabs(){
      document.getElementById("cat-tabs").innerHTML = CATS.map(([k,label]) => {
        const count = ((exam.data[tier]||{})[year]||{})[k]?.length || 0;
        return `<button class="${k===cat?'active':''}" onclick="setCat('${k}')">${label} (${count})</button>`;
      }).join("");
    }
    function setTier(t){ tier=t; pickYear(); cat="full_mocks"; renderTierTabs(); renderYearTabs(); renderCatTabs(); renderList(); }
    function setYear(y){ year=y; renderYearTabs(); renderCatTabs(); renderList(); }
    function setCat(k){ cat=k; renderCatTabs(); renderList(); }

    function renderList(){
      const tests = (((exam.data[tier]||{})[year]||{})[cat]) || [];
      const host = document.getElementById("mock-list");
      const premiumUser = EZAuth.isPremium();
      if (!tests.length){ host.innerHTML = '<div class="empty-state">No tests in this category yet.</div>'; return; }
      host.innerHTML = tests.map(t => {
        const paid = t.type === "paid";
        const locked = paid && !premiumUser;
        return `
          <div class="mock-row">
            <div>
              <h4 style="font-size:.98rem">${t.title} ${paid?'<span class="badge badge-premium">Premium</span>':'<span class="badge badge-free">Free</span>'}</h4>
              <div class="meta muted" style="font-size:.8rem">${t.qs} Qs • ${t.marks} marks • ${t.time}${t.releaseDate?` • ${t.releaseDate}`:''}</div>
            </div>
            <button class="btn btn-sm ${locked?'btn-outline':'btn-primary'}" onclick="startTest('${t.id}', ${paid}, '${encodeURIComponent(t.title)}')">${locked?'🔒 Unlock':'Start'}</button>
          </div>`;
      }).join("");
    }

    function startTest(id, paid, title){
      if (!EZAuth.currentUser()){ location.href = EZ.url("login.html?next=") + encodeURIComponent(`test/index.html?testId=${id}&title=${title}&premium=${paid?1:0}`); return; }
      if (paid && !EZAuth.isPremium()){ openUpgrade(); return; }
      location.href = EZ.url(`test/index.html?testId=${id}&title=${title}&premium=${paid?1:0}`);
    }
    function openUpgrade(){ document.getElementById("upgrade-modal").classList.add("show"); }
    function closeUpgrade(){ document.getElementById("upgrade-modal").classList.remove("show"); }
  </script>
</body>
</html>
