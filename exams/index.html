<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Exams — ExamZen</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <h1 class="section-title">Choose your exam</h1>
      <p class="muted">Select an exam to see Full Mocks, Sectionals, Subject-wise and PYQ tests by tier &amp; year.</p>
      <div class="exam-grid mt-16" id="exam-cards"></div>
    </div>
  </main>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    EZ.mountChrome("exams");
    fetch("/data/catalog.json").then(r=>r.json()).then(cat => {
      document.getElementById("exam-cards").innerHTML = Object.entries(cat).map(([id, e]) => `
        <a class="exam-card" href="${e.available ? `/exams/portal.html?exam=${id}` : '#'}" style="${e.available?'':'opacity:.55;pointer-events:none'}">
          <div class="ico">${e.emoji}</div>
          <div style="font-weight:800">${e.name}</div>
          <div class="muted" style="font-size:.72rem">${e.available ? 'Tap to open' : 'Coming soon'}</div>
        </a>`).join("");
    }).catch(()=> {
      document.getElementById("exam-cards").innerHTML = '<div class="empty-state">Could not load exams. Serve over HTTP (not file://).</div>';
    });
  </script>
</body>
</html>
