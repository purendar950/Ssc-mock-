<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Exams — ExamZen</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="ez-header"></div>

  <main class="page">
    <div class="container">
      <h1 class="section-title">Choose your exam</h1>
      <div class="grid grid-2" id="exam-cards"></div>
    </div>
  </main>

  <div id="ez-bottomnav"></div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    EZ.mountChrome("exams");
    fetch("/data/catalog.json").then(r=>r.json()).then(cat => {
      const cards = Object.entries(cat).map(([id, e]) => `
        <a class="card" href="${e.available ? `/exams/portal.html?exam=${id}` : '#'}" style="display:block;${e.available?'':'opacity:.6;pointer-events:none'}">
          <div class="row between">
            <div class="row"><span style="font-size:1.6rem">${e.emoji}</span>
              <div><h4 style="color:var(--text)">${e.name}</h4><div class="meta muted">${e.subtitle}</div></div>
            </div>
            <span class="badge ${e.available ? 'badge-free' : 'badge-premium'}">${e.available ? 'Open' : 'Soon'}</span>
          </div>
        </a>`).join("");
      document.getElementById("exam-cards").innerHTML = cards;
    }).catch(()=> {
      document.getElementById("exam-cards").innerHTML = '<div class="empty-state">Could not load exams. Run from a web server (not file://).</div>';
    });
  </script>
</body>
</html>
