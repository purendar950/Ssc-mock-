<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname.endsWith(".github.io")?"/"+location.pathname.split("/")[1]+"/":"/")+'">')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Exams — ExamZen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <h1 class="section-title">Choose your exam</h1>
      <p class="muted">Pick a category, then an exam to see Full Mocks, Sectionals, Subject-wise &amp; PYQ tests.</p>
      <div id="categories" class="mt-16"></div>
    </div>
  </main>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    EZ.mountChrome("exams");
    fetch("data/catalog.json").then(r=>r.json()).then(cat => {
      const cats = cat.categories || [];
      document.getElementById("categories").innerHTML = cats.map(c => `
        <div class="dash-section-title"><i class="fas ${c.icon || 'fa-book'}"></i> ${c.name}</div>
        <div class="exam-grid">
          ${c.exams.map(e => `
            <a class="exam-card" href="${e.available ? `exams/portal.html?exam=${e.id}` : '#'}" style="${e.available?'':'opacity:.55;pointer-events:none'}">
              <div class="ico">${e.emoji}</div>
              <div style="font-weight:800">${e.name}</div>
              <div class="muted" style="font-size:.72rem;line-height:1.3">${e.subtitle || ''}</div>
              ${e.available ? '' : '<div class="badge badge-premium" style="margin-top:6px">Soon</div>'}
            </a>`).join("")}
        </div>`).join("");
    }).catch(()=> {
      document.getElementById("categories").innerHTML = '<div class="empty-state">Could not load exams. Serve over HTTP (not file://).</div>';
    });
  </script>
</body>
</html>
