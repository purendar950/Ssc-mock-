<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Series — ExamZen</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="ez-header"></div>
  <main class="page">
    <div class="container" style="max-width:760px">
      <a href="/series/index.html" class="muted">← All series</a>
      <h1 class="section-title" id="series-title">Loading…</h1>
      <p class="muted" id="series-sub"></p>
      <div id="chapters" class="mt-16"></div>
    </div>
  </main>
  <div id="ez-bottomnav"></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    EZ.mountChrome("");
    const id = EZ.qs("series");
    fetch("/data/series.json").then(r=>r.json()).then(all => {
      const s = all[id];
      if (!s) { document.getElementById("series-title").textContent = "Series not found"; return; }
      document.getElementById("series-title").textContent = s.emoji + " " + s.title;
      document.getElementById("series-sub").textContent = s.subtitle;
      const host = document.getElementById("chapters");
      if (!s.chapters.length) { host.innerHTML = '<div class="empty-state">Content coming soon.</div>'; return; }
      host.innerHTML = s.chapters.map((c, i) => `
        <div class="test-row">
          <div>
            <h4>${i+1}. ${c.name}</h4>
            <div class="meta">${c.desc||""}</div>
          </div>
          <button class="btn btn-sm btn-primary" onclick="startChapter('${c.testId}')">Start</button>
        </div>`).join("");
    }).catch(()=> {
      document.getElementById("series-title").textContent = "Could not load series";
    });
    function startChapter(testId) {
      if (!EZAuth.currentUser()) { location.href = "/login.html?next=" + encodeURIComponent("/test/index.html?testId="+testId); return; }
      location.href = "/test/index.html?testId=" + testId;
    }
  </script>
</body>
</html>
