<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname.endsWith(".github.io")?"/"+location.pathname.split("/")[1]+"/":"/")+'">')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Preparation Series — ExamZen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="ez-header"></div>
  <main class="page">
    <div class="container">
      <h1 class="section-title">Preparation Series</h1>
      <p class="muted">Structured, guided study plans that combine sectionals, topic drills and full mocks.</p>
      <div class="grid grid-2 mt-16" id="series-cards"></div>
    </div>
  </main>
  <div id="ez-bottomnav"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    EZ.mountChrome("");
    fetch("data/series.json").then(r=>r.json()).then(series => {
      document.getElementById("series-cards").innerHTML = Object.entries(series).map(([id, s]) => `
        <a class="card" href="${s.comingSoon ? '#' : `series/portal.html?series=${id}`}" style="display:block;${s.comingSoon?'opacity:.6;pointer-events:none':''}">
          <div class="row between">
            <div class="row"><span style="font-size:1.6rem">${s.emoji}</span>
              <div><h4 style="color:var(--text)">${s.title}</h4><div class="meta muted">${s.subtitle}</div></div>
            </div>
            <span class="badge ${s.comingSoon ? 'badge-premium' : 'badge-free'}">${s.comingSoon ? 'Soon' : 'Free'}</span>
          </div>
        </a>`).join("");
    }).catch(()=> {
      document.getElementById("series-cards").innerHTML = '<div class="empty-state">Could not load series. Serve over HTTP (not file://).</div>';
    });
  </script>
</body>
</html>
