<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Result — ExamZen</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .score-card { background: linear-gradient(135deg,var(--primary),#7c3aed); color:#fff; border-radius:var(--radius); padding:24px; text-align:center; }
    .score-card .big { font-size:2.6rem; font-weight:800; }
    .stat-pills { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
    .stat-pills span { background:rgba(255,255,255,.18); padding:5px 14px; border-radius:999px; font-size:.85rem; font-weight:600; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 8px; text-align:center; border-bottom:1px solid var(--border); font-size:.9rem; }
    th:first-child, td:first-child { text-align:left; }
    th { color:var(--text-muted); font-size:.8rem; text-transform:uppercase; }
    .sol { border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; margin-bottom:12px; background:var(--card-bg); }
    .sol .opt { padding:7px 10px; border-radius:6px; margin:4px 0; border:1px solid var(--border); }
    .sol .opt.correct { background:var(--success-soft); border-color:var(--success); }
    .sol .opt.wrong { background:var(--danger-soft); border-color:var(--danger); }
    .sol .expl { margin-top:8px; font-size:.88rem; color:var(--text-muted); background:var(--bg); padding:10px; border-radius:6px; }
    .tag { font-size:.72rem; color:var(--text-muted); }
  </style>
</head>
<body>
  <div id="ez-header"></div>

  <main class="page">
    <div class="container" style="max-width:820px">
      <div id="result-root"></div>
    </div>
  </main>

  <div id="ez-bottomnav"></div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    EZ.mountChrome("");
    const id = EZ.qs("id");
    const r = (EZ.get("ez_results", [])).find(x => x.id === id);
    const root = document.getElementById("result-root");

    if (!r) {
      root.innerHTML = `<div class="empty-state"><div class="big">🤔</div>Result not found.<br><a href="/exams/index.html">Back to exams</a></div>`;
    } else {
      render();
    }

    function render() {
      const accuracy = (r.correct + r.incorrect) ? Math.round((r.correct/(r.correct+r.incorrect))*100) : 0;
      const sectionsRows = Object.values(r.sections).map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${Math.round(s.score*100)/100}</td>
          <td>${s.correct}</td>
          <td>${s.incorrect}</td>
          <td>${s.unattempted}</td>
        </tr>`).join("");

      root.innerHTML = `
        <div class="score-card">
          <div>Your Score</div>
          <div class="big">${r.score} / ${r.maxScore}</div>
          <div class="stat-pills">
            <span>✅ ${r.correct} correct</span>
            <span>❌ ${r.incorrect} wrong</span>
            <span>⬜ ${r.unattempted} skipped</span>
          </div>
          <div class="stat-pills">
            <span>🏆 Rank ${r.allIndiaRank} / ${r.totalAttempts}</span>
            <span>🎯 ${accuracy}% accuracy</span>
            <span>⏱ ${EZ.fmtDuration(r.timeTaken)}</span>
          </div>
        </div>

        <h2 class="section-title">Section-wise breakdown</h2>
        <div class="card" style="padding:0;overflow:auto">
          <table>
            <thead><tr><th>Section</th><th>Score</th><th>Correct</th><th>Wrong</th><th>Skipped</th></tr></thead>
            <tbody>${sectionsRows}</tbody>
          </table>
        </div>

        <div class="row wrap mt-24">
          <a class="btn btn-primary" href="/test/index.html?testId=${r.testId}">Reattempt</a>
          <button class="btn btn-outline" onclick="toggleSolutions()" id="sol-btn">View Solutions</button>
          <a class="btn btn-outline" href="/profile.html">Back to Profile</a>
        </div>

        <div id="solutions" class="hidden mt-24"></div>`;
    }

    let solShown = false;
    function toggleSolutions() {
      solShown = !solShown;
      const host = document.getElementById("solutions");
      document.getElementById("sol-btn").textContent = solShown ? "Hide Solutions" : "View Solutions";
      host.classList.toggle("hidden", !solShown);
      if (solShown && !host.dataset.rendered) { renderSolutions(host); host.dataset.rendered = "1"; }
    }

    function renderSolutions(host) {
      host.innerHTML = "<h2 class='section-title'>Solutions</h2>" + r.answers.map((a, i) => {
        const opts = ["A","B","C","D"].map(o => {
          let cls = "";
          if (o === a.correct) cls = "correct";
          else if (o === a.selected && a.selected !== a.correct) cls = "wrong";
          return `<div class="opt ${cls}"><b>${o}.</b> ${a.options[o].en}</div>`;
        }).join("");
        const verdict = a.selected == null ? "⬜ Skipped" : a.isCorrect ? "✅ Correct" : "❌ Wrong";
        return `
          <div class="sol">
            <div class="row between">
              <span class="tag">Q${i+1} • ${a.subject} • ${a.topic||""}</span>
              <span class="tag">${verdict}</span>
            </div>
            <div style="font-weight:600;margin:6px 0">${a.en}</div>
            <div class="tag" style="margin-bottom:8px">${a.hi||""}</div>
            ${opts}
            ${a.explanation ? `<div class="expl"><b>Explanation:</b> ${a.explanation.en||""}</div>` : ""}
            <button class="btn btn-sm btn-outline mt-8" onclick='saveQuestion(${i})'>🔖 Save question</button>
          </div>`;
      }).join("");
    }

    function saveQuestion(i) {
      const u = EZAuth.currentUser();
      if (!u) { EZ.toast("Login to save questions"); return; }
      const a = r.answers[i];
      const key = "ez_saved_" + u.uid;
      const lib = EZ.get(key, []);
      const qid = r.testId + "_" + a.sectionId + "_" + a.qIndex;
      if (lib.some(x => x.questionId === qid)) { EZ.toast("Already saved"); return; }
      lib.push({
        questionId: qid, en: a.en, hi: a.hi, options: a.options,
        correct: a.correct, explanation: a.explanation,
        subject: a.subject, topic: a.topic, savedAt: new Date().toISOString(),
      });
      EZ.set(key, lib);
      EZ.toast("Saved to your library 🔖");
    }
  </script>
</body>
</html>
