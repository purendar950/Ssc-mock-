<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname.endsWith(".github.io")?"/"+location.pathname.split("/")[1]+"/":"/")+'">')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Admin Vault — ExamZen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="ez-header"></div>

  <main class="page">
    <div class="container">
      <h1 class="section-title">🔐 Admin Vault</h1>
      <div id="gate"></div>
      <div id="panel" class="hidden">
        <div class="stat-grid" id="stats"></div>
        <div class="tabs mt-24" id="tabs">
          <button class="active" data-tab="buy" onclick="switchTab('buy')">💰 Buy Requests</button>
          <button data-tab="partners" onclick="switchTab('partners')">🎁 Partner Requests</button>
          <button data-tab="payouts" onclick="switchTab('payouts')">💵 Payouts</button>
          <button data-tab="ledger" onclick="switchTab('ledger')">📊 Ledger</button>
        </div>
        <div id="tab-content"></div>
      </div>
    </div>
  </main>

  <div id="ez-bottomnav"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script>
    EZ.mountChrome("");
    let u = null, tab = "buy";
    const state = { payments: [], applications: [], partners: [], payouts: [] };

    EZAuth.ready.then(() => { if (!EZAuth.requireLogin()) return; u = EZAuth.currentUser(); boot(); });

    function isAdmin() {
      const cu = EZAuth.currentUser();
      return cu && (cu.isAdmin === true || (cu.username||"").toLowerCase() === "admin");
    }

    async function boot() {
      if (!isAdmin()) {
        const supa = (typeof EZAuth !== "undefined" && EZAuth.mode === "supabase");
        document.getElementById("gate").innerHTML = `
          <div class="card center">
            <p class="muted">This area is restricted to administrators.</p>
            ${supa
              ? `<p class="muted mt-8" style="font-size:.82rem">Set yourself as admin in Supabase:<br><code>update public.profiles set role='admin' where username='${(EZAuth.currentUser()||{}).username||'YOUR_USERNAME'}';</code></p>`
              : `<p class="muted mt-8" style="font-size:.82rem">Demo mode: grant yourself admin access to explore the panel.</p>
                 <button class="btn btn-primary mt-16" onclick="claimAdmin()">Enable admin access (demo)</button>`}
          </div>`;
        document.getElementById("panel").classList.add("hidden");
        return;
      }
      document.getElementById("gate").innerHTML = "";
      document.getElementById("panel").classList.remove("hidden");
      await reload();
    }

    async function claimAdmin() {
      const ok = await EZAuth.updateUser({ isAdmin: true });
      EZ.toast(ok ? "Admin access enabled" : "Not allowed (set role in Supabase)");
      boot();
    }

    async function reload() {
      document.getElementById("tab-content").innerHTML = '<div class="empty-state">Loading…</div>';
      const [payments, applications, partners, payouts, stats] = await Promise.all([
        EZStore.listPayments(), EZStore.listApplications(), EZStore.listPartners(), EZStore.listPayouts(), EZStore.adminStats(),
      ]);
      state.payments = payments; state.applications = applications; state.partners = partners; state.payouts = payouts;
      renderStats(stats);
      renderTab();
    }

    function renderStats(s) {
      document.getElementById("stats").innerHTML = `
        <div class="stat-card"><div class="num">${s.users}</div><div class="lbl">Registered Users</div></div>
        <div class="stat-card"><div class="num">${s.premium}</div><div class="lbl">Premium Users</div></div>
        <div class="stat-card"><div class="num">₹${s.revenue}</div><div class="lbl">Total Revenue</div></div>
        <div class="stat-card"><div class="num">${s.partners}</div><div class="lbl">Active Partners</div></div>`;
    }

    function switchTab(t) {
      tab = t;
      document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab===t));
      renderTab();
    }
    function renderTab() {
      const c = document.getElementById("tab-content");
      if (tab === "buy") c.innerHTML = buyTab();
      else if (tab === "partners") c.innerHTML = partnerTab();
      else if (tab === "payouts") c.innerHTML = payoutTab();
      else c.innerHTML = ledgerTab();
    }

    /* ---------- Buy requests ---------- */
    function buyTab() {
      const reqs = [...state.payments].sort((a,b)=> new Date(b.submittedAt)-new Date(a.submittedAt));
      const pending = reqs.filter(r=>r.status==="pending");
      if (!reqs.length) return `<div class="empty-state">No payment requests yet.</div>`;
      return `
        <h3 class="section-title">Pending (${pending.length})</h3>
        ${rows(pending, true)}
        <h3 class="section-title">History</h3>
        ${rows(reqs.filter(r=>r.status!=="pending"), false)}`;
      function rows(list, actions) {
        if (!list.length) return `<div class="muted" style="padding:8px">None.</div>`;
        return `<div class="card table-wrap" style="padding:0"><table class="data-table">
          <thead><tr><th>User</th><th>UTR</th><th>Amount</th><th>Coupon</th><th>${actions?'Actions':'Status'}</th></tr></thead>
          <tbody>${list.map(r=>`<tr>
            <td>${r.username||''}<div class="meta muted">${r.email||''}</div></td>
            <td>${r.utr||''}</td>
            <td>₹${r.amount}</td>
            <td>${r.couponUsed||'NONE'}</td>
            <td>${actions
              ? `<button class="btn btn-sm btn-success" onclick="approveBuy('${r.id}')">✅ Approve</button>
                 <button class="btn btn-sm btn-danger" onclick="rejectBuy('${r.id}')">❌ Reject</button>`
              : `<span class="status-pill status-${r.status}">${r.status}</span>`}</td>
          </tr>`).join("")}</tbody></table></div>`;
      }
    }
    async function approveBuy(id){ const ok = await EZStore.approvePayment(id, u.uid); EZ.toast(ok?"Approved & premium granted":"Approve failed"); reload(); }
    async function rejectBuy(id){ await EZStore.rejectPayment(id, u.uid); EZ.toast("Rejected"); reload(); }

    /* ---------- Partner requests ---------- */
    function partnerTab() {
      const apps = [...state.applications].sort((a,b)=> new Date(b.appliedAt)-new Date(a.appliedAt));
      const pending = apps.filter(a=>a.status==="pending");
      if (!apps.length) return `<div class="empty-state">No partner applications yet.</div>`;
      return `
        <h3 class="section-title">Pending (${pending.length})</h3>
        ${rows(pending, true)}
        <h3 class="section-title">History</h3>
        ${rows(apps.filter(a=>a.status!=="pending"), false)}`;
      function rows(list, actions){
        if (!list.length) return `<div class="muted" style="padding:8px">None.</div>`;
        return `<div class="card table-wrap" style="padding:0"><table class="data-table">
          <thead><tr><th>User</th><th>Code</th><th>UPI</th><th>Links</th><th>${actions?'Actions':'Status'}</th></tr></thead>
          <tbody>${list.map(a=>`<tr>
            <td>${a.username||''}<div class="meta muted">${a.phone||''}</div></td>
            <td><b>${a.couponCode}</b></td>
            <td>${a.upiId||''}</td>
            <td style="max-width:160px;word-break:break-all">${a.socialLinks||''}</td>
            <td>${actions
              ? `<button class="btn btn-sm btn-success" onclick="approveApp('${a.id}')">Approve</button>
                 <button class="btn btn-sm btn-danger" onclick="rejectApp('${a.id}')">Reject</button>`
              : `<span class="status-pill status-${a.status}">${a.status}</span>`}</td>
          </tr>`).join("")}</tbody></table></div>`;
      }
    }
    async function approveApp(id){ const ok = await EZStore.approveApplication(id); EZ.toast(ok?"Partner approved":"Could not approve (code taken?)"); reload(); }
    async function rejectApp(id){ await EZStore.rejectApplication(id); EZ.toast("Rejected"); reload(); }

    /* ---------- Payouts ---------- */
    function payoutTab() {
      const pos = [...state.payouts].sort((a,b)=> new Date(b.requestedAt)-new Date(a.requestedAt));
      const pending = pos.filter(p=>p.status==="pending");
      if (!pos.length) return `<div class="empty-state">No payout requests yet.</div>`;
      return `
        <h3 class="section-title">Pending (${pending.length})</h3>
        ${rows(pending, true)}
        <h3 class="section-title">History</h3>
        ${rows(pos.filter(p=>p.status!=="pending"), false)}`;
      function rows(list, actions){
        if (!list.length) return `<div class="muted" style="padding:8px">None.</div>`;
        return `<div class="card table-wrap" style="padding:0"><table class="data-table">
          <thead><tr><th>Partner</th><th>Amount</th><th>UPI</th><th>${actions?'Actions':'Status'}</th></tr></thead>
          <tbody>${list.map(p=>`<tr>
            <td>${p.couponCode}</td>
            <td>₹${p.amount}</td>
            <td>${p.upiId||''}</td>
            <td>${actions
              ? `<button class="btn btn-sm btn-success" onclick="payPo('${p.id}')">Mark Paid</button>
                 <button class="btn btn-sm btn-danger" onclick="rejPo('${p.id}')">Reject</button>`
              : `<span class="status-pill status-${p.status}">${p.status}</span>`}</td>
          </tr>`).join("")}</tbody></table></div>`;
      }
    }
    async function payPo(id){ await EZStore.payPayout(id); EZ.toast("Marked paid"); reload(); }
    async function rejPo(id){ await EZStore.rejectPayout(id); EZ.toast("Rejected"); reload(); }

    /* ---------- Ledger ---------- */
    function ledgerTab() {
      const ps = state.partners;
      if (!ps.length) return `<div class="empty-state">No partners yet.</div>`;
      return `<div class="card table-wrap" style="padding:0"><table class="data-table">
        <thead><tr><th>Code</th><th>Partner</th><th>Sales</th><th>Earned</th><th>Available</th><th>Withdrawn</th></tr></thead>
        <tbody>${ps.map(p=>`<tr>
          <td><b>${p.couponCode}</b></td>
          <td>${p.username||''}</td>
          <td>${p.totalSales||0}</td>
          <td>₹${p.totalRevenue||0}</td>
          <td>₹${p.pendingPayout||0}</td>
          <td>₹${p.totalWithdrawn||0}</td>
        </tr>`).join("")}</tbody></table></div>`;
    }
  </script>
</body>
</html>
