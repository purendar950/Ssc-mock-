<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname.endsWith(".github.io")?"/"+location.pathname.split("/")[1]+"/":"/")+'">')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>My Dashboard — ExamZen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="ez-header"></div>

  <main class="page">
    <div class="container" style="max-width:760px">
      <div id="banner"></div>

      <div class="dash-section-title"><i class="fas fa-chart-line"></i> Performance</div>
      <div class="stat-grid" id="stats"></div>

      <div class="dash-section-title"><i class="fas fa-bolt"></i> Quick Actions</div>
      <div class="quick-actions" id="quick"></div>

      <div class="dash-section-title"><i class="fas fa-crown"></i> Membership</div>
      <div id="plan"></div>

      <div class="dash-section-title"><i class="fas fa-clock-rotate-left"></i> Recent Results</div>
      <div id="results-list"></div>
    </div>
  </main>

  <div id="ez-bottomnav"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    EZ.mountChrome("profile");

    EZAuth.ready.then(() => {
      if (!EZAuth.requireLogin()) return;
      render();
    });

    function pctClass(p) { return p >= 70 ? "pct-good" : p >= 40 ? "pct-mid" : "pct-low"; }

    function render() {
      const u = EZAuth.currentUser();
      if (!u) return;
      const premium = EZAuth.isPremium();
      const initials = (u.name || u.username || "U").split(" ").map(s => s[0]).join("").slice(0, 2).toUpperCase();
      const expiry = u.planExpiry ? new Date(u.planExpiry).toLocaleDateString() : "—";

      /* ---- Banner ---- */
      document.getElementById("banner").innerHTML = `
        <div class="profile-banner">
          <div class="pb-row">
            <div class="pb-avatar">${initials}</div>
            <div style="min-width:0">
              <h2>${u.name || u.username}</h2>
              <div class="pb-sub">@${u.username}${u.email ? " • " + u.email : ""}</div>
              <span class="pb-pill"><i class="fas fa-${premium ? "crown" : "user"}"></i> ${premium ? "PRO Member" : "Free Plan"}</span>
            </div>
          </div>
        </div>`;

      /* ---- Stats from results ---- */
      const results = (EZ.get("ez_results", [])).filter(r => r.userId === u.uid)
        .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));

      const tests = results.length;
      let avgPct = 0, bestRank = null, accNum = 0, accDen = 0;
      results.forEach(r => {
        if (r.maxScore) avgPct += (r.score / r.maxScore) * 100;
        if (r.allIndiaRank != null) bestRank = bestRank == null ? r.allIndiaRank : Math.min(bestRank, r.allIndiaRank);
        accNum += (r.correct || 0); accDen += (r.correct || 0) + (r.incorrect || 0);
      });
      avgPct = tests ? Math.round(avgPct / tests) : 0;
      const accuracy = accDen ? Math.round((accNum / accDen) * 100) : 0;

      document.getElementById("stats").innerHTML = `
        <div class="stat-card dash-stat"><div class="ic"><i class="fas fa-file-pen"></i></div><div class="num">${tests}</div><div class="lbl">Tests Taken</div></div>
        <div class="stat-card dash-stat ${pctClass(avgPct)==='pct-low'?'warn':'ok'}"><div class="ic"><i class="fas fa-percent"></i></div><div class="num">${avgPct}%</div><div class="lbl">Avg Score</div></div>
        <div class="stat-card dash-stat ok"><div class="ic"><i class="fas fa-bullseye"></i></div><div class="num">${accuracy}%</div><div class="lbl">Accuracy</div></div>
        <div class="stat-card dash-stat warn"><div class="ic"><i class="fas fa-trophy"></i></div><div class="num">${bestRank == null ? "—" : "#" + bestRank}</div><div class="lbl">Best Rank</div></div>`;

      /* ---- Quick actions ---- */
      document.getElementById("quick").innerHTML = `
        <a class="qa" href="exams/index.html"><i class="fas fa-graduation-cap"></i>Mock Tests</a>
        <a class="qa" href="live-test/index.html"><i class="fas fa-bolt"></i>Live Tests</a>
        <a class="qa" href="saved.html"><i class="fas fa-bookmark"></i>Saved</a>
        <a class="qa" href="series/index.html"><i class="fas fa-layer-group"></i>Series</a>`;

      /* ---- Plan card ---- */
      document.getElementById("plan").innerHTML = `
        <div class="card plan-card ${premium ? "plan-premium" : "plan-free"}">
          <div class="pc-left">
            <div class="pc-ic"><i class="fas fa-${premium ? "crown" : "lock-open"}"></i></div>
            <div>
              <b>${premium ? "Premium" : "Free"} plan</b>
              <div class="muted" style="font-size:.82rem">${premium ? "Valid till " + expiry : "Upgrade to unlock all mocks & PYQs"}</div>
            </div>
          </div>
          <div class="row wrap">
            ${premium ? "" : '<a class="btn btn-primary btn-sm" href="pricing.html">Upgrade ₹99/yr</a>'}
            <button class="btn btn-outline btn-sm" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</button>
          </div>
        </div>`;

      /* ---- Recent results ---- */
      const host = document.getElementById("results-list");
      if (!tests) {
        host.innerHTML = `<div class="empty-state"><div class="big">📊</div>No tests attempted yet.<br><a href="exams/index.html">Take your first mock →</a></div>`;
        return;
      }
      host.innerHTML = results.slice(0, 8).map(r => {
        const pct = r.maxScore ? Math.round((r.score / r.maxScore) * 100) : 0;
        const cls = pctClass(pct);
        return `
          <a class="result-card" href="result/index.html?id=${r.id}">
            <div class="rc-top">
              <div style="min-width:0">
                <h4>${r.testName}</h4>
                <div class="rc-meta">${r.score}/${r.maxScore} • Rank ${r.allIndiaRank}/${r.totalAttempts} • ${new Date(r.submittedAt).toLocaleDateString()}</div>
              </div>
              <div class="rc-pct ${cls}">${pct}%</div>
            </div>
            <div class="rc-bar ${cls}"><span style="width:${pct}%"></span></div>
          </a>`;
      }).join("");
    }

    function logout() {
      EZAuth.logout();
      EZ.toast("Logged out");
      setTimeout(() => location.href = EZ.url("index.html"), 500);
    }
  </script>
</body>
</html>
