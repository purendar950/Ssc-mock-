<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname.endsWith(".github.io")?"/"+location.pathname.split("/")[1]+"/":"/")+'">')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>Buy Premium — ExamZen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="ez-header"></div>

  <main class="page">
    <div class="container" style="max-width:520px">
      <h1 class="section-title">Get Premium</h1>

      <div class="card">
        <div class="field">
          <label>Coupon code (optional)</label>
          <div class="row">
            <input class="input" id="coupon" placeholder="e.g. WELCOME or a partner code" style="text-transform:uppercase" />
            <button class="btn btn-outline" onclick="applyCoupon()">Apply</button>
          </div>
          <div class="meta muted" id="coupon-msg"></div>
        </div>

        <div class="card center" style="background:var(--bg)">
          <div class="muted">Amount payable</div>
          <div style="font-size:2rem;font-weight:800;color:var(--primary)" id="amount">₹124</div>
          <div class="center mt-16">
            <div id="qr" style="width:180px;height:180px;margin:0 auto;border:1px dashed var(--border);border-radius:12px;display:grid;place-items:center;color:var(--text-muted)">QR ₹124</div>
            <div class="meta mt-8">UPI ID: <b>examzen@upi</b></div>
          </div>
        </div>

        <h3 class="mt-24">Submit payment details</h3>
        <form onsubmit="return submitPayment(event)">
          <div class="field"><label>Phone</label><input class="input" id="phone" required /></div>
          <div class="field"><label>12-digit UTR / Reference No.</label><input class="input" id="utr" pattern="[0-9]{10,14}" required /></div>
          <button class="btn btn-primary btn-block" type="submit">Submit for Verification</button>
        </form>
        <p class="muted mt-16" style="font-size:.82rem">After submission, your request is verified within 1–6 hours. In this demo, an admin can approve it instantly from the <a href="admin-vault.html">Admin Vault</a>.</p>
      </div>
    </div>
  </main>

  <div id="ez-bottomnav"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script>
    EZ.mountChrome("");
    if (!EZAuth.requireLogin()) {/* redirected */}

    let resolved = EZStore.resolveCoupon("");

    // Pre-fill coupon from ?ref= referral links
    const ref = EZ.qs("ref");
    if (ref) { document.getElementById("coupon").value = ref.toUpperCase(); applyCoupon(); }

    function applyCoupon() {
      const code = (document.getElementById("coupon").value || "").trim().toUpperCase();
      const msg = document.getElementById("coupon-msg");
      resolved = EZStore.resolveCoupon(code);
      if (!code) { msg.textContent = ""; render(); return; }
      if (resolved.valid && resolved.code !== "NONE") {
        msg.style.color = "var(--success)";
        msg.textContent = `Coupon applied! You save ₹${resolved.discount}.`;
      } else {
        msg.style.color = "var(--danger)";
        msg.textContent = "Invalid or inactive coupon code.";
        resolved = EZStore.resolveCoupon("");
      }
      render();
    }

    function render() {
      document.getElementById("amount").textContent = "₹" + resolved.price;
      document.getElementById("qr").textContent = "QR ₹" + resolved.price;
    }

    function submitPayment(e) {
      e.preventDefault();
      const u = EZAuth.currentUser();
      if (EZAuth.isPremium()) { EZ.toast("You're already Premium 🎉"); return false; }
      EZStore.addPayment({
        id: "pay_" + Date.now(),
        userId: u.uid, username: u.username, email: u.email,
        phone: document.getElementById("phone").value,
        utr: document.getElementById("utr").value,
        amount: resolved.price,
        discount: resolved.discount,
        couponUsed: resolved.code,
        status: "pending",
        submittedAt: new Date().toISOString(),
      });
      EZ.toast("Payment submitted — pending verification ⏳");
      setTimeout(()=> location.href = EZ.url("profile.html"), 1100);
      return false;
    }
    render();
  </script>
</body>
</html>
